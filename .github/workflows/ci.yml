name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  LEFTHOOK: "0"

jobs:
  ci:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux, os: ubuntu-latest }
          - { name: macos, os: macos-latest }
          - { name: windows, os: windows-latest }

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-targets

      - name: Windows diagnostic — dumpbin on failing test exe
        if: failure() && matrix.platform.os == 'windows-latest'
        working-directory: src-tauri
        shell: pwsh
        run: |
          Write-Host "=== Locating dumpbin.exe ==="
          $dumpbin = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Filter dumpbin.exe -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "dumpbin: $dumpbin"

          Write-Host ""
          Write-Host "=== All exes under target\debug\deps\ ==="
          Get-ChildItem target\debug\deps\*.exe | ForEach-Object { $_.FullName }

          $exe = Get-ChildItem target\debug\deps\multitool_lib-*.exe | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { Write-Host "no multitool_lib-*.exe found"; exit 0 }
          Write-Host ""
          Write-Host "=== /DEPENDENTS for $exe ==="
          & $dumpbin /DEPENDENTS $exe

          Write-Host ""
          Write-Host "=== /IMPORTS for $exe (first 400 lines) ==="
          & $dumpbin /IMPORTS $exe | Select-Object -First 400

          Write-Host ""
          Write-Host "=== Direct launch (--list) ==="
          Push-Location target\debug\deps
          & $exe --list 2>&1
          Write-Host "ExitCode (decimal): $LASTEXITCODE"
          Write-Host ("ExitCode (hex): 0x{0:X8}" -f $LASTEXITCODE)
          Pop-Location

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: tauri build (compile-only, no installers)
        run: pnpm tauri build --no-bundle
