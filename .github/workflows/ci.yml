name: CI

on:
  pull_request:
  push:
    branches: [master]
  # On-demand trigger so feature branches can spot-check the cross-OS matrix
  # without opening a draft PR. Fire via `gh workflow run ci.yml --ref <branch>`
  # or the Actions tab. See CLAUDE.md → Per-PR checklist for when to use it.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  LEFTHOOK: "0"

jobs:
  ci:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux, os: ubuntu-latest }
          - { name: macos, os: macos-latest }
          - { name: windows, os: windows-latest }

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps (Tauri)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        # `-p multitool-core` keeps the Tauri shell's test exe out of the
        # run. On the Windows Server 2025 runner image, the shell's test
        # exe fails to launch with STATUS_ENTRYPOINT_NOT_FOUND because the
        # transitive `getrandom 0.3` Windows backend imports `ProcessPrng`
        # from `bcryptprimitives.dll`, which doesn't resolve at exe-launch
        # time on that image. All testable logic lives in multitool-core.
        run: cargo test -p multitool-core --all-targets

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: tauri build (compile-only, no installers)
        run: pnpm tauri build --no-bundle
