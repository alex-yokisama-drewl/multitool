name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  LEFTHOOK: "0"

jobs:
  release:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux, os: ubuntu-latest }
          - { name: macos, os: macos-latest }
          - { name: windows, os: windows-latest }

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps (Tauri)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install macOS build deps (autotools for mp3lame-sys)
        if: matrix.platform.os == 'macos-latest'
        # mp3lame-sys builds LAME 3.100 with GNU autotools on Unix.
        # ubuntu-latest already has autoconf/automake/libtool via
        # build-essential; macOS doesn't ship them by default.
        run: brew install autoconf automake libtool

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build and attach artifacts to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
