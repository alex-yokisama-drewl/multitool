# git-cliff configuration. Generates CHANGELOG.md from Conventional Commits
# on the way to a release tag.
#
# Usage:
#   git cliff --output CHANGELOG.md           # full history
#   git cliff --unreleased --prepend CHANGELOG.md  # incremental update
#
# git-cliff is not added as a project dep — install once on the machine that
# cuts releases (`cargo install git-cliff`) or rely on the release workflow.

[changelog]
header = """
# Changelog

All notable changes to this project follow [Semantic Versioning](https://semver.org/) and are sourced from Conventional Commit history.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",      group = "Features" },
  { message = "^fix",       group = "Bug fixes" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Refactoring" },
  { message = "^test",      group = "Tests" },
  { message = "^docs",      group = "Documentation" },
  { message = "^ci",        group = "CI" },
  { message = "^build",     group = "Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",     group = "Chores" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
