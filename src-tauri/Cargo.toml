[package]
name = "multitool"
version = "0.1.0"
description = "Cross-platform offline multitool desktop app"
authors = ["Alex Yokisama <alex@drewl.com>"]
edition = "2021"

[lib]
name = "multitool_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
