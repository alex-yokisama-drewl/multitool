[package]
name = "multitool"
version = "0.1.0"
description = "Cross-platform offline multitool desktop app"
authors = ["Alex Yokisama <alex@drewl.com>"]
edition = "2021"

[lib]
name = "multitool_lib"
# Desktop-only (SPEC §2). `cdylib`/`staticlib` are for mobile; cdylib also breaks `cargo test` on Windows.
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
